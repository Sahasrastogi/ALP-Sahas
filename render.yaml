services:
  # Backend API + Socket.IO
  - type: web
    name: alp-api
    runtime: node
    plan: starter
    buildCommand: npm ci --prefix server
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false

  # Frontend (Vite build) as a Render Static Site
  - type: web
    name: alp-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
